<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BCBA Academy</title>

<link rel="stylesheet" href="styles.css">

<style>

body{

    background:#f5f7fb;

}

.topic-container{

    max-width:900px;

    margin:60px auto;

    background:white;

    border-radius:20px;

    padding:50px;

    box-shadow:0 15px 40px rgba(0,0,0,.1);

}

.topic-title{

    font-size:42px;

    color:#0F4C81;

}

.topic-description{

    margin-top:20px;

    color:#607d8b;

    font-size:18px;

    line-height:1.7;

}

.materials{

    margin-top:45px;

}

.material{

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:#f8fafc;

    border-radius:15px;

    padding:20px;

    margin-bottom:15px;

}

.material span{

    font-size:18px;

}

.drive-button{

    display:inline-block;

    margin-top:45px;

    background:#1976D2;

    color:white;

    text-decoration:none;

    padding:18px 35px;

    border-radius:15px;

    font-weight:bold;

}

.back{

    display:inline-block;

    margin-top:25px;

    color:#1976D2;

    text-decoration:none;

}

</style>

</head>

<body>

<div class="topic-container">

</div>
