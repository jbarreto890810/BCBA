
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curso de Griego</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 500px;
      margin: auto;
      background: rgba(255,255,255,0.12);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { font-size: 34px; }
    p { font-size: 18px; line-height: 1.5; }
    a {
      display: inline-block;
      margin-top: 25px;
      padding: 16px 28px;
      background: #ffcc00;
      color: #222;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      font-size: 18px;
    }
    a:hover { background: #ffd633; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📚 Curso de Griego</h1>
    <p>Accede a todos los temas del curso desde cualquier dispositivo: iPhone, Android, Windows o Mac.</p>
    <a href="https://drive.google.com/drive/folders/1UYEKSCT1ZBITNNwXNIKYs1IapRrn7HWZt?usp=sharing" target="_blank">
      🚀 Entrar al Curso
    </a>
  </div>
</body>
</html>
